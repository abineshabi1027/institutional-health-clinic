<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 40px;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            color: var(--primary);
        }

      
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

     
        .kpi-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
            color: var(--text-main);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏥 Student Health Operations</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Real-time clinical data overview</p>
    </div>

    <div class="kpi-grid">
        <div class="card">
            <div class="kpi-title">Total Clinic Visits</div>
            <div class="kpi-value" id="kpiTotalVisits">--</div>
        </div>
        <div class="card">
            <div class="kpi-title">Unique Patients Treated</div>
            <div class="kpi-value" id="kpiUniquePatients">--</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card">
            <h3 style="margin-top:0">Visit Trends (Last 6 Months)</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-top:0">Top Recorded Symptoms</h3>
            <div class="chart-container">
                <canvas id="symptomChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Diagnosis Breakdown</h3>
            <div class="chart-container">
                <canvas id="diagnosisChart"></canvas>
            </div>
        </div>
    </div>

    <script>
     
        let charts = {};

        async function fetchDashboardData() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/dashboard-data');
                const result = await response.json();
                
                if (result.status === 'success') {
                    populateKPIs(result.data.kpis);
                    buildTrendChart(result.data.trends);
                    buildSymptomChart(result.data.symptoms);
                    buildDiagnosisChart(result.data.diagnoses);
                }
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                alert('Ensure your Flask server is running on port 5000!');
            }
        }

        function populateKPIs(kpis) {
           
            document.getElementById('kpiTotalVisits').innerText = kpis.total_visits.toLocaleString();
            document.getElementById('kpiUniquePatients').innerText = kpis.unique_patients.toLocaleString();
        }

        function buildTrendChart(trendData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(trendData),
                    datasets: [{
                        label: 'Total Visits',
                        data: Object.values(trendData),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function buildSymptomChart(symptomData) {
            const ctx = document.getElementById('symptomChart').getContext('2d');
            charts.symptom = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(symptomData),
                    datasets: [{
                        label: 'Incidents',
                        data: Object.values(symptomData),
                        backgroundColor: '#10b981',
                        borderRadius: 4
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function buildDiagnosisChart(diagData) {
            const ctx = document.getElementById('diagnosisChart').getContext('2d');
            charts.diagnosis = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(diagData),
                    datasets: [{
                        data: Object.values(diagData),
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    cutout: '65%'
                }
            });
        }
        window.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
